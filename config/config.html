<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pebble eReader — Upload EPUB</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; margin: 16px; color: #222; }
  h1 { font-size: 20px; }
  .row { margin: 12px 0; }
  label { display: block; font-size: 14px; margin-bottom: 4px; }
  select, input[type=number] { font-size: 16px; padding: 6px; border-radius: 6px; border: 1px solid #ccc; min-width: 140px; }
  button { font-size: 16px; padding: 10px 16px; border-radius: 8px; border: 0; background: #ff4500; color: #fff; }
  button:disabled { background: #999; }
  #status { white-space: pre-wrap; font-size: 14px; color: #555; }
  .meta { font-size: 14px; color: #333; }
</style>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
</head>
<body>
<h1>Pebble eReader</h1>

<div class="row">
  <label for="platform">Watch model</label>
  <select id="platform">
    <option value="aplite">Pebble / Pebble Steel (144x168)</option>
    <option value="basalt">Pebble Time / Time Steel (144x168)</option>
    <option value="chalk">Pebble Time Round (180x180)</option>
    <option value="diorite">Pebble 2 / 2 HR (144x168)</option>
    <option value="emery">Pebble Time 2 (200x228)</option>
    <option value="flint">Pebble Core 2 Duo (200x228)</option>
    <option value="gabbro">Pebble Core Time 2 (200x228)</option>
  </select>
</div>

<div class="row">
  <label for="file">EPUB file</label>
  <input type="file" id="file" accept=".epub" />
</div>

<div class="row">
  <label for="font">Font size on watch</label>
  <select id="font">
    <option value="G14">Small (Gothic 14)</option>
    <option value="G18" selected>Medium (Gothic 18)</option>
    <option value="G24">Large (Gothic 24 Bold)</option>
    <option value="G28">Extra Large (Gothic 28)</option>
  </select>
</div>

<div class="row">
  <label for="start">Start at page (1 = beginning)</label>
  <input type="number" id="start" min="1" value="1" />
</div>

<div class="row meta" id="meta"></div>
<div class="row" id="status"></div>

<div class="row">
  <button id="save" disabled>Save to watch</button>
  <button id="cancel" style="background:#666">Cancel</button>
</div>

<script>
// Per-platform text-area metrics for the watch's TextLayer.
var PLATFORMS = {
  rect_small: {
    G14: { cpl: 24, lines: 9 },
    G18: { cpl: 19, lines: 7 },
    G24: { cpl: 13, lines: 5 },
    G28: { cpl: 11, lines: 4 },
  },
  chalk: {
    G14: { cpl: 24, lines: 8 },
    G18: { cpl: 19, lines: 6 },
    G24: { cpl: 13, lines: 5 },
    G28: { cpl: 11, lines: 4 },
  },
  rect_large: {
    G14: { cpl: 38, lines: 13 },
    G18: { cpl: 30, lines: 11 },
    G24: { cpl: 22, lines: 8 },
    G28: { cpl: 18, lines: 7 },
  },
};

function platformGroup(p) {
  if (p === 'emery' || p === 'flint' || p === 'gabbro') return 'rect_large';
  if (p === 'chalk') return 'chalk';
  return 'rect_small';
}

function readParam(name) {
  var m = new RegExp('[?&]' + name + '=([^&]+)').exec(window.location.search);
  return m ? decodeURIComponent(m[1]) : null;
}

var PLATFORM = readParam('platform') || 'emery';
var FONTS = PLATFORMS[platformGroup(PLATFORM)];

var book = null;
var blocks = [];           // [{ kind: 'heading'|'para', text, level? }, ...]
var pages = null;          // [{ text, chapter, heading? }]
var chapters = null;       // [{ title, firstPage }]
var bookTitle = '';
var bookAuthor = '';

function setStatus(msg) { document.getElementById('status').textContent = msg; }

// Word-wrap aware pagination. Reserves room for a heading line on the first
// page of each chapter (heading is rendered in a bigger font on the watch,
// so we count it as occupying ~2 body lines).
function paginate(blocks, fontId) {
  var f = FONTS[fontId] || FONTS.G18;
  var cpl = f.cpl, maxLines = f.lines;
  var headingCost = 2; // lines reserved on a chapter-start page

  var out = [];
  var pageLines = [];
  var currentChapter = -1;
  var pendingHeading = null;
  var currentHeadingForPage = null;

  function flush() {
    while (pageLines.length && pageLines[pageLines.length - 1] === '') pageLines.pop();
    if (pageLines.length || currentHeadingForPage) {
      out.push({
        text: pageLines.join('\n'),
        chapter: currentChapter < 0 ? 0 : currentChapter,
        heading: currentHeadingForPage || null,
      });
    }
    pageLines = [];
    currentHeadingForPage = null;
  }

  function effectiveMaxLines() {
    return currentHeadingForPage ? Math.max(1, maxLines - headingCost) : maxLines;
  }

  function pushLine(line) {
    if (pageLines.length >= effectiveMaxLines()) flush();
    pageLines.push(line);
  }

  function wrap(text) {
    text = text.replace(/\s+/g, ' ').trim();
    if (!text) return;
    var words = text.split(' ');
    var line = '';
    for (var i = 0; i < words.length; i++) {
      var word = words[i];
      while (word.length > cpl) {
        if (line) { pushLine(line); line = ''; }
        pushLine(word.slice(0, cpl));
        word = word.slice(cpl);
      }
      var candidate = line ? (line + ' ' + word) : word;
      if (candidate.length <= cpl) line = candidate;
      else { pushLine(line); line = word; }
    }
    if (line) pushLine(line);
  }

  for (var b = 0; b < blocks.length; b++) {
    var blk = blocks[b];
    if (blk.kind === 'heading') {
      // Start a fresh page for the chapter heading.
      flush();
      chapters.push({ title: blk.text, firstPage: out.length });
      currentChapter = chapters.length - 1;
      currentHeadingForPage = blk.text;
      // No body yet on this page.
    } else if (blk.kind === 'para') {
      wrap(blk.text);
      // Paragraph break: blank line if room.
      if (pageLines.length < effectiveMaxLines()) pageLines.push('');
    }
  }
  flush();
  return out;
}

// Walk an EPUB doc's body and emit blocks in reading order. Treats
// h1/h2/h3 as chapter starts; p, li, blockquote, pre as paragraphs.
// Skips empty whitespace nodes.
function blocksFromDoc(doc) {
  var out = [];
  if (!doc || !doc.body) return out;
  var nodes = doc.body.querySelectorAll(
      'h1, h2, h3, h4, h5, h6, p, li, blockquote, pre, div');
  if (nodes.length === 0) {
    var t = (doc.body.textContent || '').replace(/\s+/g, ' ').trim();
    if (t) out.push({ kind: 'para', text: t });
    return out;
  }
  for (var i = 0; i < nodes.length; i++) {
    var n = nodes[i];
    // Skip <div> wrappers whose descendants we already visit.
    if (n.tagName && /^DIV$/i.test(n.tagName)) {
      // include only leaf-ish divs (no block children)
      if (n.querySelector('p, h1, h2, h3, h4, h5, h6, li, blockquote, pre')) continue;
    }
    var t = (n.textContent || '').replace(/\s+/g, ' ').trim();
    if (!t) continue;
    if (/^H[1-6]$/i.test(n.tagName)) {
      out.push({ kind: 'heading', text: t });
    } else {
      out.push({ kind: 'para', text: t });
    }
  }
  return out;
}

async function extractBlocks(b) {
  await b.ready;
  var items = (b.spine && b.spine.items) ? b.spine.items : [];
  var all = [];
  for (var k = 0; k < items.length; k++) {
    var it = items[k];
    try {
      var doc = await b.load(it.href);
      var blks = blocksFromDoc(doc);
      // If the spine item has a label (from the NCX/Nav), use it as a chapter
      // heading even if the document had no <h*>.
      var label = it.label || (it.title || null);
      if (blks.length && blks[0].kind !== 'heading' && label) {
        all.push({ kind: 'heading', text: label });
      }
      for (var j = 0; j < blks.length; j++) all.push(blks[j]);
    } catch (e) { /* skip */ }
  }
  // If no headings were found at all, synthesise spine-level chapters.
  var anyHeading = all.some(function (x) { return x.kind === 'heading'; });
  if (!anyHeading && items.length) {
    var rebuilt = [];
    var seen = 0;
    for (var m = 0; m < items.length; m++) {
      rebuilt.push({ kind: 'heading',
                     text: items[m].label || ('Chapter ' + (m + 1)) });
      // Re-extract for this spine item.
      try {
        var docB = await b.load(items[m].href);
        var bs = blocksFromDoc(docB);
        for (var z = 0; z < bs.length; z++) {
          if (bs[z].kind !== 'heading') rebuilt.push(bs[z]);
        }
      } catch (e) {}
      seen++;
    }
    if (seen) all = rebuilt;
  }
  return all;
}

function repaginate() {
  if (!blocks.length) return;
  chapters = [];
  var fontId = document.getElementById('font').value;
  pages = paginate(blocks, fontId);
  // If pagination produced no chapters (shouldn't happen, but...) seed one.
  if (chapters.length === 0) {
    chapters.push({ title: bookTitle || 'Book', firstPage: 0 });
    for (var i = 0; i < pages.length; i++) pages[i].chapter = 0;
  }
  var startEl = document.getElementById('start');
  startEl.max = pages.length;
  if (parseInt(startEl.value, 10) > pages.length) startEl.value = pages.length;
  document.getElementById('meta').textContent =
      bookTitle + (bookAuthor ? ' — ' + bookAuthor : '') +
      ' · ' + pages.length + ' pages · ' + chapters.length + ' chapters';
}

document.addEventListener('DOMContentLoaded', function () {
  var sel = document.getElementById('platform');
  sel.value = PLATFORM;
  sel.addEventListener('change', function () {
    PLATFORM = sel.value;
    FONTS = PLATFORMS[platformGroup(PLATFORM)];
    repaginate();
  });
});

document.getElementById('font').addEventListener('change', repaginate);

document.getElementById('file').addEventListener('change', async function (e) {
  var f = e.target.files[0];
  if (!f) return;
  setStatus('Reading file...');
  document.getElementById('save').disabled = true;
  try {
    var buf = await f.arrayBuffer();
    book = ePub(buf);
    setStatus('Parsing EPUB...');
    var meta = await book.loaded.metadata;
    bookTitle = (meta && meta.title) || f.name.replace(/\.epub$/i, '');
    bookAuthor = (meta && meta.creator) || '';
    setStatus('Extracting blocks...');
    blocks = await extractBlocks(book);
    setStatus('Paginating...');
    repaginate();
    setStatus('Ready. Press Save to send to your watch.');
    document.getElementById('save').disabled = false;
  } catch (err) {
    console.error(err);
    setStatus('Failed to parse EPUB: ' + err.message);
  }
});

function closeWith(payload) {
  document.location = 'pebblejs://close#' + encodeURIComponent(JSON.stringify(payload));
}

document.getElementById('save').addEventListener('click', function () {
  if (!pages || !pages.length) return;
  var fontId = document.getElementById('font').value;
  var start = parseInt(document.getElementById('start').value, 10) || 1;
  if (start < 1) start = 1;
  if (start > pages.length) start = pages.length;
  closeWith({
    title: bookTitle,
    author: bookAuthor,
    pages: pages,
    chapters: chapters,
    font: fontId,
    startPage: start - 1,
  });
});

document.getElementById('cancel').addEventListener('click', function () {
  document.location = 'pebblejs://close';
});
</script>
</body>
</html>
