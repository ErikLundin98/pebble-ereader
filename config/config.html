<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pebble eReader — Upload EPUB</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; margin: 16px; color: #222; }
  h1 { font-size: 20px; }
  .row { margin: 12px 0; }
  label { display: block; font-size: 14px; margin-bottom: 4px; }
  select, input[type=number] { font-size: 16px; padding: 6px; border-radius: 6px; border: 1px solid #ccc; min-width: 140px; }
  button { font-size: 16px; padding: 10px 16px; border-radius: 8px; border: 0; background: #ff4500; color: #fff; }
  button:disabled { background: #999; }
  #status { white-space: pre-wrap; font-size: 14px; color: #555; }
  .meta { font-size: 14px; color: #333; }
</style>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
</head>
<body>
<h1>Pebble eReader</h1>

<div class="row">
  <label for="platform">Watch model</label>
  <select id="platform">
    <option value="aplite">Pebble / Pebble Steel (144x168)</option>
    <option value="basalt">Pebble Time / Time Steel (144x168)</option>
    <option value="chalk">Pebble Time Round (180x180)</option>
    <option value="diorite">Pebble 2 / 2 HR (144x168)</option>
    <option value="emery">Pebble Time 2 (200x228)</option>
    <option value="flint">Pebble Core 2 Duo (200x228)</option>
    <option value="gabbro">Pebble Core Time 2 (200x228)</option>
  </select>
</div>

<div class="row">
  <label for="file">EPUB file</label>
  <input type="file" id="file" accept=".epub" />
</div>

<div class="row">
  <label for="font">Font size on watch</label>
  <select id="font">
    <option value="G14">Small (Gothic 14)</option>
    <option value="G18" selected>Medium (Gothic 18)</option>
    <option value="G24">Large (Gothic 24 Bold)</option>
    <option value="G28">Extra Large (Gothic 28)</option>
  </select>
</div>

<div class="row">
  <label for="start">Start at page (1 = beginning)</label>
  <input type="number" id="start" min="1" value="1" />
</div>

<div class="row meta" id="meta"></div>
<div class="row" id="status"></div>

<div class="row">
  <button id="save" disabled>Save to watch</button>
  <button id="cancel" style="background:#666">Cancel</button>
</div>

<script>
// Per-platform text-area metrics. The watch's TextLayer is sized to
// (screen_w - 8) x (screen_h - 16-status), with the system Gothic fonts.
// charsPerLine and lines are conservative-but-tight estimates so each page
// fills most of the screen and only modestly overflows when characters are
// wider than average.
//
// Platforms:
//   aplite/basalt/diorite: 144x168 rectangular
//   chalk:                 180x180 round (usable rect ~152x152)
//   emery/flint/gabbro:    200x228 rectangular (Pebble Time 2, Core 2 Duo)
var PLATFORMS = {
  rect_small: {
    G14: { charsPerLine: 24, lines: 9 },
    G18: { charsPerLine: 19, lines: 7 },
    G24: { charsPerLine: 13, lines: 5 },
    G28: { charsPerLine: 11, lines: 4 },
  },
  chalk: {
    G14: { charsPerLine: 24, lines: 8 },
    G18: { charsPerLine: 19, lines: 6 },
    G24: { charsPerLine: 13, lines: 5 },
    G28: { charsPerLine: 11, lines: 4 },
  },
  rect_large: {
    G14: { charsPerLine: 38, lines: 13 },
    G18: { charsPerLine: 30, lines: 11 },
    G24: { charsPerLine: 22, lines: 8 },
    G28: { charsPerLine: 18, lines: 7 },
  },
};

function platformGroup(p) {
  if (p === 'emery' || p === 'flint' || p === 'gabbro') return 'rect_large';
  if (p === 'chalk') return 'chalk';
  return 'rect_small';
}

function readParam(name) {
  var m = new RegExp('[?&]' + name + '=([^&]+)').exec(window.location.search);
  return m ? decodeURIComponent(m[1]) : null;
}

var PLATFORM = readParam('platform') || 'emery';
var FONTS = PLATFORMS[platformGroup(PLATFORM)];

document.addEventListener('DOMContentLoaded', function () {
  var sel = document.getElementById('platform');
  sel.value = PLATFORM;
  sel.addEventListener('change', function () {
    PLATFORM = sel.value;
    FONTS = PLATFORMS[platformGroup(PLATFORM)];
    repaginate();
  });
});

var fullText = '';
var pages = null;
var title = '';

function setStatus(msg) { document.getElementById('status').textContent = msg; }

// Word-wrap aware pagination. Keeps \n\n paragraph breaks. Tries to fill each
// page with as many wrapped lines as fit for the chosen font.
function paginate(text, fontId) {
  var f = FONTS[fontId] || FONTS.G18;
  var cpl = f.charsPerLine, maxLines = f.lines;
  var paragraphs = text.split(/\n\s*\n/);
  var out = [];
  var pageLines = [];

  function pushPage() {
    if (pageLines.length) {
      // Strip trailing blank lines.
      while (pageLines.length && pageLines[pageLines.length - 1] === '') pageLines.pop();
      out.push(pageLines.join('\n'));
      pageLines = [];
    }
  }

  for (var p = 0; p < paragraphs.length; p++) {
    var para = paragraphs[p].replace(/\s+/g, ' ').trim();
    if (!para) continue;
    var words = para.split(' ');
    var line = '';
    for (var w = 0; w < words.length; w++) {
      var word = words[w];
      // Break monstrously long words.
      while (word.length > cpl) {
        if (line) {
          if (pageLines.length >= maxLines) pushPage();
          pageLines.push(line);
          line = '';
        }
        if (pageLines.length >= maxLines) pushPage();
        pageLines.push(word.slice(0, cpl));
        word = word.slice(cpl);
      }
      var candidate = line ? (line + ' ' + word) : word;
      if (candidate.length <= cpl) {
        line = candidate;
      } else {
        if (pageLines.length >= maxLines) pushPage();
        pageLines.push(line);
        line = word;
      }
    }
    if (line) {
      if (pageLines.length >= maxLines) pushPage();
      pageLines.push(line);
    }
    // Paragraph break: insert blank line if room, otherwise let the next
    // paragraph start a fresh page.
    if (pageLines.length >= maxLines) {
      pushPage();
    } else {
      pageLines.push('');
    }
  }
  pushPage();
  return out;
}

async function extractText(book) {
  await book.ready;
  var items = (book.spine && book.spine.items) ? book.spine.items : [];
  var blocks = [];
  for (var k = 0; k < items.length; k++) {
    var it = items[k];
    try {
      var doc = await book.load(it.href);
      if (!doc) continue;
      var nodes = doc.querySelectorAll('p, h1, h2, h3, h4, h5, h6, li, blockquote, pre');
      if (nodes.length) {
        for (var j = 0; j < nodes.length; j++) {
          var t = (nodes[j].textContent || '').replace(/\s+/g, ' ').trim();
          if (t) blocks.push(t);
        }
      } else if (doc.body) {
        var t2 = (doc.body.textContent || '').replace(/\s+/g, ' ').trim();
        if (t2) blocks.push(t2);
      }
    } catch (e) { /* skip */ }
  }
  return blocks.join('\n\n');
}

function repaginate() {
  if (!fullText) return;
  var fontId = document.getElementById('font').value;
  pages = paginate(fullText, fontId);
  var startEl = document.getElementById('start');
  startEl.max = pages.length;
  if (parseInt(startEl.value, 10) > pages.length) startEl.value = pages.length;
  document.getElementById('meta').textContent = title + ' — ' + pages.length + ' pages';
}

document.getElementById('font').addEventListener('change', repaginate);

document.getElementById('file').addEventListener('change', async function (e) {
  var f = e.target.files[0];
  if (!f) return;
  setStatus('Reading file...');
  document.getElementById('save').disabled = true;
  try {
    var buf = await f.arrayBuffer();
    var book = ePub(buf);
    setStatus('Parsing EPUB...');
    var meta = await book.loaded.metadata;
    title = (meta && meta.title) || f.name.replace(/\.epub$/i, '');
    setStatus('Extracting text...');
    fullText = await extractText(book);
    repaginate();
    setStatus('Ready. Press Save to send to your watch.');
    document.getElementById('save').disabled = false;
  } catch (err) {
    console.error(err);
    setStatus('Failed to parse EPUB: ' + err.message);
  }
});

function closeWith(payload) {
  document.location = 'pebblejs://close#' + encodeURIComponent(JSON.stringify(payload));
}

document.getElementById('save').addEventListener('click', function () {
  if (!pages || !pages.length) return;
  var fontId = document.getElementById('font').value;
  var start = parseInt(document.getElementById('start').value, 10) || 1;
  if (start < 1) start = 1;
  if (start > pages.length) start = pages.length;
  closeWith({
    title: title,
    pages: pages,
    font: fontId,
    startPage: start - 1,
  });
});

document.getElementById('cancel').addEventListener('click', function () {
  document.location = 'pebblejs://close';
});
</script>
</body>
</html>
